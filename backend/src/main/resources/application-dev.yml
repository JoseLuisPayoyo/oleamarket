spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/oleamarket_dev
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update  # Crea/actualiza tablas automáticamente
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

jwt:
  secret: dev-secret-key-oleamarket-2025-change-in-production-min-256-bits-long

logging:
  level:
    com.oleamarket: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG